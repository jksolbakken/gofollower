version: 2

project_name: gofollower

before:
  hooks:
    - go mod tidy

builds:
  - id: linmac
    env: [ CGO_ENABLED=0 ]
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64
    dir: .
    main: ./cmd/gofollower
    binary: follow
  - id: windows
    env: [ CGO_ENABLED=0 ]
    targets:
      - windows_amd64
    dir: .
    main: ./cmd/gofollower
    binary: follow

checksum:
  name_template: 'checksums.txt'

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

release:
  github:
    owner: jksolbakken
    name: gofollower
  header: |
    ## gofollower ({{ .Version }})

homebrew_casks:
  - repository:
      owner: jksolbakken
      name: homebrew-tap
      branch: main
      token: "{{ .Env.BREW_PUSH_TOKEN }}"
    name: gofollower
    homepage: "https://github.com/jksolbakken/gofollower"
    description: "Command-line utility for following HTTP links"
    directory: Casks
    binaries: 
      - follow
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/follow"]
          end



